<!doctype html>
<html lang="en">
  <head>
    {{> head }}
    <title>emassie.dev | Home</title>
  </head>

  <body>
    {{> header }}
    <main id="main-content">
      <h2>Apps</h2>
      <nav
        class="link-grid"
        aria-label="App navigation"
      >
        {{#each links}}
        <a
          href="{{this.href}}"
          class="link-grid--item"
        >
          <img
            class="link-grid--item-thumbnail"
            src="{{this.thumbnailSrc}}"
          />
          <div class="link-grid--item-info">
            <span>{{this.title}}</span>
            <span>{{this.description}}</span>
          </div>
        </a>
        {{/each}}
      </nav>

      <h2>Cats</h2>
      <em-carousel id="cat-carousel">
        {{#each catFiles}}
        <img src="/cats/{{this}}" />
        {{/each}}
      </em-carousel>
    </main>
    {{> footer }}
    <script
      type="module"
      src="/src/pages/home/index.ts"
    ></script>
  </body>
</html>
